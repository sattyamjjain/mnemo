name: release-crate

# Publish the 0.5.x **compliance line** to crates.io on a `v*.*.*` tag.
#
# Scope — the minimal importable set a user needs to run auditable memory,
# published in dependency order:
#
#     mnemo-core  →  mnemo-attention-state  →  mnemo-compliance  →  mnemo-mcp
#
# `mnemo-attention-state` is in the set because `mnemo-mcp` hard-depends on it
# (server.rs uses `mnemo_attention_state::AttentionStateStore`); it was
# introduced after the last 0.4.4 crates.io publish, so it must be published for
# `mnemo-mcp` to resolve.
#
# Plus a fifth leaf crate, `mnemo-db` — a dependency-free name-reservation
# pointer that redirects Rust users to mnemo-core/mnemo-mcp (the unqualified
# `mnemo` name on crates.io is an unrelated project). It has no internal deps, so
# it publishes independently; on an unchanged workspace version the four crates
# above 404-gate as already-present and only mnemo-db is newly published.
#
# Why a separate, tag-gated workflow (vs. cargo-publish.yml's push-to-main run):
#   - It gates on ONLY the publish closure, so the pre-existing golem-wit WASM
#     link failure (which reddens the workspace-wide build in cargo-publish.yml)
#     cannot block a release of these four crates.
#   - It publishes in the CORRECT dependency order (core before its dependents;
#     compliance before mcp) — cargo-publish.yml lists mcp before compliance.
#   - A tag is an explicit, intentional release trigger; a docs push is not.
#
# Prerequisites
#   - CARGO_REGISTRY_TOKEN repo secret (already configured for cargo-publish.yml).
#   - Every internal path dep in the root Cargo.toml carries `version` alongside
#     `path` (required for `cargo publish` to accept it).
#
# Idempotency: crates.io publishes are PERMANENT. Each crate publishes only if
# its version is not already on crates.io (404 check), so re-running a tag is a
# safe no-op for crates already up.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (package + verify, no upload)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Gate (fmt + clippy + tests, publish closure)
    if: github.repository == 'sattyamjjain/mnemo'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Format is a whole-repo invariant and cheap.
      - run: cargo fmt --all -- --check
      # Clippy + tests are scoped to the crates being published (and their
      # transitive deps, pulled automatically) so an unrelated, pre-existing
      # WASM/golem link failure elsewhere in the workspace can never gate a
      # release of this compliance line. `-D warnings` matches CI.
      - name: Clippy (publish closure)
        run: |
          cargo clippy --all-targets \
            -p mnemo-core -p mnemo-attention-state \
            -p mnemo-compliance -p mnemo-mcp -p mnemo-db -- -D warnings
      # Full closure test suite. The recall-QUALITY benchmark
      # `domain_scoped_dilution` was made platform-robust (its "flat P@10 should
      # degrade" assertion now accepts the floor case where the approximate HNSW
      # surfaces no gold in top-k on some platforms — e.g. flat P@10 = 0 at every
      # corpus size on Linux; the headline "scoped beats flat by >= 0.05" claim is
      # still asserted), so the gate runs the whole suite with no skips.
      - name: Test (publish closure)
        run: |
          cargo test \
            -p mnemo-core -p mnemo-attention-state \
            -p mnemo-compliance -p mnemo-mcp -p mnemo-db

  publish:
    name: Publish to crates.io
    needs: gate
    if: github.repository == 'sattyamjjain/mnemo'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: crates-io
      url: https://crates.io/crates/mnemo-core
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # --- Dry-run first (task step 4) --------------------------------------
      # A PER-CRATE dry-run cannot resolve the not-yet-published internal deps
      # (mnemo-core@<ver> is not on the registry until the real publish below), so
      # the dependents' packaging step fails with "no matching package". Instead
      # dry-run the whole set in ONE coordinated invocation: cargo computes the
      # publish order and satisfies inter-member deps from the local workspace,
      # packaging AND verify-building all four before any upload.
      - name: Dry-run (coordinated packaging + verify)
        run: |
          cargo publish --dry-run \
            -p mnemo-core -p mnemo-attention-state \
            -p mnemo-compliance -p mnemo-mcp -p mnemo-db

      # --- Real publish, dependency order -----------------------------------
      - name: Publish (dependency order, idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
        run: |
          set -euo pipefail
          ver=$(grep -E '^version\s*=' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "workspace version: ${ver}"
          # crates.io's API rejects requests without a User-Agent (403).
          UA="mnemo-release-crate-workflow (https://github.com/sattyamjjain/mnemo)"
          # mnemo-db is a leaf name-reservation pointer (no internal deps); it
          # publishes last and needs no propagation wait. When the workspace
          # version is unchanged, the four compliance-line crates 404-gate as
          # already-present and only mnemo-db publishes.
          crates="mnemo-core mnemo-attention-state mnemo-compliance mnemo-mcp mnemo-db"
          for crate in $crates; do
            http=$(curl -s -A "$UA" -o /dev/null -w "%{http_code}" \
              "https://crates.io/api/v1/crates/${crate}/${ver}")
            if [ "$http" = "200" ]; then
              echo "  ${crate}@${ver} — already on crates.io, skipping"
              continue
            elif [ "$http" != "404" ]; then
              echo "  ${crate}@${ver} — unexpected HTTP ${http} from crates.io; failing"
              exit 1
            fi
            if [ -n "$DRY_RUN" ]; then
              echo "::group::dry-run publish ${crate} (workflow_dispatch dry_run)"
              cargo publish -p "${crate}" --dry-run --no-verify
              echo "::endgroup::"
              continue
            fi
            echo "::group::Publish ${crate}@${ver}"
            cargo publish -p "${crate}"
            echo "::endgroup::"
            # Let the sparse index propagate before publishing a crate that
            # depends on the one just uploaded (verify build resolves it live).
            # No wait after the terminal crates (mnemo-mcp / the leaf mnemo-db) —
            # nothing published later depends on them.
            if [ "${crate}" != "mnemo-mcp" ] && [ "${crate}" != "mnemo-db" ]; then
              echo "Waiting 60s for crates.io index propagation"
              sleep 60
            fi
          done
