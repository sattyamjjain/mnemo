name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

# Notes for maintainers:
# - `mnemo-python` is a PyO3 cdylib that must be built with `maturin`, not
#   `cargo`. Every workspace-wide cargo command excludes it.
# - `mnemo-grpc` needs `protoc`; we install it up front on every job that
#   compiles the workspace.
# - The `onnx` feature of `mnemo-core` is currently broken against the
#   installed `ort` API (ndarray 0.16→0.17 drift from Dependabot PR #11).
#   Until that integration is repaired, we deliberately do NOT pass
#   `--all-features` to clippy — the broken feature would poison every
#   workspace check. Default features still cover the entire production
#   surface.
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (required by mnemo-grpc build script)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets --workspace --exclude mnemo-python

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (required by mnemo-grpc build script)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace --exclude mnemo-python

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (required by mnemo-grpc build script)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # mnemo-python is a PyO3 cdylib that won't link without the
      # Python development headers + maturin context. Built separately
      # via the pypi-publish workflow.
      - run: cargo build --workspace --exclude mnemo-python

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  postgres:
    name: Postgres integration (pgvector ANN)
    runs-on: ubuntu-latest
    # Live pgvector database so the MNEMO_TEST_POSTGRES_URL-gated ANN test
    # (crates/mnemo-postgres/tests/pgvector_ann.rs) actually runs instead of
    # skipping — this is the #99 acceptance gate.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mnemo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MNEMO_TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/mnemo_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mnemo-postgres --test pgvector_ann -- --nocapture
