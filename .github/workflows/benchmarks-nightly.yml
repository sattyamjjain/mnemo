name: benchmarks-nightly

on:
  schedule:
    # 02:11 UTC — off-peak for HF + model providers, and offset from the
    # main CI runner so we don't queue behind it.
    - cron: "11 2 * * *"
  workflow_dispatch:
    inputs:
      max_examples:
        description: "Cap the number of dataset examples (useful for smoke runs)."
        required: false
        default: "200"
      judge:
        description: "Scoring mode — exact or llm"
        required: false
        default: "llm"

jobs:
  bench:
    # The gate keeps baseline.json honest but needs credentials that
    # forks don't have. Skip on forks and when the secret isn't set —
    # workflow_dispatch from the upstream repo still runs.
    if: github.repository == 'sattyamjjain/mnemo'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        dataset: [locomo, longmemeval]

    env:
      MNEMO_BENCH_REGRESSION_PP: "3.0"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Mnemo native extension
        run: |
          pip install --upgrade pip
          pip install maturin
          cd python && maturin develop --release

      - name: Install bench deps
        run: pip install 'mnemo[benchmark]' anthropic datasets

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MNEMO_JUDGE_MODEL: claude-haiku-4-5-20251001
        run: |
          python -m mnemo.benches.locomo_runner \
            --dataset ${{ matrix.dataset }} \
            --db-path /tmp/mnemo-${{ matrix.dataset }}.db \
            --max-examples ${{ inputs.max_examples || 200 }} \
            --judge ${{ inputs.judge || 'llm' }} \
            --report-dir docs/benchmarks

      - name: Check regression vs baseline
        run: |
          python .github/scripts/check_bench_regression.py \
            --dataset ${{ matrix.dataset }} \
            --baseline docs/benchmarks/baseline.json \
            --run-dir docs/benchmarks \
            --max-regression-pp "${MNEMO_BENCH_REGRESSION_PP}"

      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.dataset }}-${{ github.run_id }}
          path: |
            docs/benchmarks/*-${{ matrix.dataset }}.md
            docs/benchmarks/*-${{ matrix.dataset }}.json
